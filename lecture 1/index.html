<!DOCTYPE html>
<html>
<head>
    <title> My Semantic Webpage</title>
</head>
<body>
    <style>
        body{
            background-color: lightblue;
        }

        header{
            background-color: rgb(224, 106, 124);
            color: white;
            text-align: center;
            padding: 10px;
        }

        table{
            background-color: white;
            margin: auto;
        }

        th{
            background-color: rgb(212, 121, 179);
            color: white;
        }

        form{
            background-color: white;
        }

        footer{
            background-color: rgb(226, 135, 208);
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
    <header>
        <h1>Student Information</h1>
    </header>

    <section>
        <h2>Student Table</h2>

        <table border="4">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
            </tr>

            <tr>
                <td>Rahul</td>
                <td>20</td>
                <td>BCA</td>
            </tr>

            <tr>
                <td>Priya</td>
                <td>21</td>
                <td>B.Tech</td>
            </tr>
        </table>
    </section>

    <section>
        <h2>Student Form</h2>

        <form>
            Name:
            <input type="text"><br><br>

            Email:
            <input type="email"><br><br>

            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

            Course:
            <select>
                <option>BCA</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
            </select>
            <br><br>

            <input type="submit" value="Submit">
        </form>
    </section>

    <footer>
        <p>© 2026 Student Website</p>
    </footer>

</body>
</html>
